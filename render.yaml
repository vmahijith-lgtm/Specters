services:
  - type: web
    name: hiresignal-backend
    runtime: python
    rootDir: backend
    buildCommand: "./render-build.sh"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.4
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "/opt/render/project/playwright"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
